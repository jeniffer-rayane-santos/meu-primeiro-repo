<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div id="div_mensagem">

        <img src="./Assets/loxen-logo.png" alt="" style="width: 500px; height: auto;">

        <h1>Simulador Financeiro</h1>
        <h2>Nome da Empresa: <input type="text" id="inpt_empresa"></h2>
        <h2>Insira seu Lucro Mensal: <input type="number" id="inpt_lucro"></h2>
        <h2>Insira o Ticket Médio (Por cliente): <input type="number" id="inpt_ticket_medio"></h2>
        <h2>Insira o Fluxo de Clientes (Por dia): <input type="number" id="inpt_fluxo"></h2>

        <br><br>

        <button onclick=loxen() id="loxen">Simule</button>
    </div>
    <br><br>
    <div id="div_resultado"></div>

    <style>

        input{
        border-radius: 5px;
        padding: 5px;
        }

        button {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: aliceblue;
            background-color: #4262FF;
            font-size: 20px;
            border-radius: 5px;
            padding: 10px;
        }

        #div_mensagem {
            border-color: #4262FF;
            color: rgb(0, 0, 0);
            background-color: aliceblue;
            border-radius: 15px;
            border-style: solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            padding: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            Flex-direction: column;
            Width: 700px;
            margin: 0 auto;
        }

        #div_resultado {
            border-color: #4262FF;
            color: rgb(0, 0, 0);
            background-color: aliceblue;
            border-radius: 15px;
            border-style: solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            padding: 48px;
            font-size: 25px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            Flex-direction: column;
            Width: 700px;
            margin: 0 auto;
        }
    </style>

</body>

</html>

<script>

    function loxen() {

        let lucro = Number(inpt_lucro.value)
        let ticket = Number(inpt_ticket_medio.value)
        let fluxo = Number(inpt_fluxo.value)
        let nome = inpt_empresa.value
        let lucroLoxen = lucro * 1.3
        let ticketLoxen = ticket * 1.3
        let fluxoLoxen = fluxo * 1.3


        div_resultado.innerHTML = `Olá ${nome}, com Loxen, seu novo lucro será de ${lucroLoxen.toFixed(2)} <br><br> 
    O ticket médio por cliente irá ser ${ticketLoxen.toFixed(2)}<br><br>
    Além do fluxo da sua loja aumentar para ${fluxoLoxen.toFixed(0)} após a instalação dos sensores!`

        div_resultado.style.display = 'flex'
    }



</script>
